name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Decode signing keystore
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"
          echo "KEYSTORE_FILE=$GITHUB_WORKSPACE/release.keystore" >> "$GITHUB_ENV"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Find and rename APK
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          echo "Found APK: $APK_FILE"
          cp "$APK_FILE" jianji-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: jianji-release-apk
          path: app/build/outputs/apk/release/*.apk

      # 幂等守卫：同一 tag 已发布过 Release 则跳过，避免重复生成 APK Release
      - name: Check if release already exists
        id: check_release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release for $TAG already exists, will skip creation to avoid duplicates."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') && steps.check_release.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: jianji-${{ github.ref_name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
