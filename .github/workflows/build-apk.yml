name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Decode signing keystore
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"
          echo "KEYSTORE_FILE=$GITHUB_WORKSPACE/release.keystore" >> "$GITHUB_ENV"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      # 版本号守卫：发布版 versionCode 必须严格大于上一个 release tag。
      # 否则已装用户（含本地高 versionCode 调试包）升级时会触发系统“已安装更高版本”
      # 而失败。此步在打包后、上传前拦截，避免发布降级版本。
      - name: Guard versionCode strictly increases
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          NEW_VC=$(grep -oE 'versionCode = [0-9]+' app/build.gradle.kts | grep -oE '[0-9]+')
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "无历史 tag，跳过 versionCode 守卫"
            exit 0
          fi
          PREV_VC=$(git show "$PREV_TAG:app/build.gradle.kts" | grep -oE 'versionCode = [0-9]+' | grep -oE '[0-9]+')
          echo "上一个发布: $PREV_TAG (versionCode=$PREV_VC) | 本次: ${GITHUB_REF_NAME} (versionCode=$NEW_VC)"
          if [ "$NEW_VC" -le "$PREV_VC" ]; then
            echo "::error::versionCode $NEW_VC 未严格大于上一个发布 $PREV_TAG ($PREV_VC)。发布降级会导致已装用户升级时提示“已安装更高版本”而失败。请提高 versionCode 后重试。"
            exit 1
          fi
          echo "OK: versionCode 单调递增，可安全发布"

      - name: Find and rename APK
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          echo "Found APK: $APK_FILE"
          cp "$APK_FILE" jianji-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: jianji-release-apk
          path: app/build/outputs/apk/release/*.apk

      # 幂等守卫：同一 tag 已发布过 Release 则跳过，避免重复生成 APK Release
      - name: Check if release already exists
        id: check_release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release for $TAG already exists, will skip creation to avoid duplicates."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') && steps.check_release.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: jianji-${{ github.ref_name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
